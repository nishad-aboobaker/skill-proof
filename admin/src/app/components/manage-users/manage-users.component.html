<header class="top-bar">
    <h3 style="font-family: 'Outfit', sans-serif; font-size: 1.125rem; font-weight: 700;">User Management</h3>
    <div style="display: flex; align-items: center; gap: 24px;">
        <div
            style="display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: white; border: 1px solid var(--border); border-radius: 12px;">
            <div
                style="width: 32px; height: 32px; border-radius: 8px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem;">
                AD</div>
            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-main);">Admin User</span>
        </div>
        <button (click)="logout()" class="btn btn-secondary">Logout</button>
    </div>
</header>

<main class="content-area" style="padding: 32px;">
    <div class="table-container">
        <div class="table-header">
            <div class="header-left">
                <h3
                    style="font-family: 'Outfit', sans-serif; font-size: 1.125rem; font-weight: 700; color: var(--text-main); margin: 0;">
                    All Users</h3>
                <p style="font-size: 0.8125rem; color: var(--text-muted); margin: 4px 0 0 0;">Total users
                    registered on the platform.</p>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()"
                        placeholder="Search users by name or email...">
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Join Date</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let user of filteredUsers" (click)="viewUserDetails(user._id)" style="cursor: pointer;">
                        <td>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="user-avatar">{{ user.name.charAt(0) }}</div>
                                <span style="font-weight: 600; color: var(--text-main);">{{ user.name }}</span>
                            </div>
                        </td>
                        <td>{{ user.email }}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span class="role-badge" [class.admin]="user.role === 'admin'">
                                    {{ user.role }}
                                </span>
                                <span *ngIf="!user.isActive" class="role-badge"
                                    style="background: var(--error-bg); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2);">
                                    Blocked
                                </span>
                            </div>
                        </td>
                        <td>
                            {{ user.createdAt | date:'mediumDate' }}
                        </td>
                        <td style="text-align: right;">
                            <div style="display: flex; justify-content: flex-end; gap: 8px;">
                                <button class="action-btn" (click)="$event.stopPropagation(); viewUserDetails(user._id)"
                                    title="View Details">
                                    <i data-lucide="eye"></i>
                                </button>
                                <button *ngIf="user.isActive" class="action-btn delete"
                                    (click)="$event.stopPropagation(); blockUser(user._id)" title="Block User">
                                    <i data-lucide="ban"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr *ngIf="filteredUsers.length === 0 && !loading">
                        <td colspan="5" style="text-align: center; padding: 64px 32px; color: var(--text-muted);">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
                                <div
                                    style="width: 56px; height: 56px; border-radius: 50%; background: #f8fafc; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                                    <i data-lucide="user-x" style="width: 28px; height: 28px;"></i>
                                </div>
                                <div>
                                    <p style="font-weight: 600; color: var(--text-main); margin: 0;">No users
                                        found</p>
                                    <p style="font-size: 0.8125rem; margin: 4px 0 0 0;">Try adjusting your
                                        search or filters.</p>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
