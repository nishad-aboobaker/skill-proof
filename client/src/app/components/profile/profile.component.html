<div class="profile-page">
    <div class="container container-sm">

        <!-- Loading State -->
        <div *ngIf="loading" class="profile-skeleton">
            <div class="skeleton avatar-sk"></div>
            <div class="skeleton-text">
                <div class="skeleton title-sk"></div>
                <div class="skeleton subtitle-sk"></div>
            </div>
        </div>

        <ng-container *ngIf="!loading && profile">

            <!-- Notifications -->
            <div class="alert alert-success" *ngIf="successMsg">✓ {{ successMsg }}</div>
            <div class="alert alert-error" *ngIf="error">⚠️ {{ error }}</div>

            <!-- Profile Header Card -->
            <header class="profile-header card">
                <div class="avatar-large">{{ profile.name?.charAt(0)?.toUpperCase() }}</div>
                <div class="header-info">
                    <div class="title-row">
                        <h1>{{ profile.name }}</h1>
                        <span class="badge role-badge">{{ profile.role | titlecase }}</span>
                    </div>
                    <p class="email-link">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        {{ profile.email }}
                    </p>
                    <p class="join-date">Member since {{ profile.createdAt | date:'MMMM yyyy' }}</p>
                </div>
            </header>

            <!-- Edit Profile Form -->
            <form (ngSubmit)="onSave()" #profileForm="ngForm" class="profile-form card">

                <!-- Section: Account Information -->
                <fieldset class="form-section">
                    <legend>Account Information</legend>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="p-name">Full Name</label>
                            <input type="text" id="p-name" [(ngModel)]="form.name" name="name" class="form-control"
                                placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label for="p-phone">Phone Number</label>
                            <input type="tel" id="p-phone" [(ngModel)]="form.phone" name="phone" class="form-control"
                                placeholder="+1 (555) 000-0000">
                        </div>
                    </div>
                </fieldset>

                <!-- Section: Professional Profile (Job Seekers) -->
                <fieldset class="form-section">
                    <legend>Professional Profile</legend>
                    <div class="form-group">
                        <label for="p-bio">Bio</label>
                        <textarea id="p-bio" [(ngModel)]="form.bio" name="bio" class="form-control" rows="3"
                            placeholder="Tell employers about yourself..."></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="p-skills">Skills (comma separated)</label>
                            <input type="text" id="p-skills" [(ngModel)]="form.skills" name="skills"
                                class="form-control" placeholder="e.g. React, Node.js">
                            <div class="skills-preview" *ngIf="parsedSkills.length">
                                <span class="tag" *ngFor="let s of parsedSkills">{{ s }}</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="p-exp">Experience Level</label>
                            <select id="p-exp" [(ngModel)]="form.experience" name="experience" class="form-control">
                                <option value="">Select Level</option>
                                <option value="junior">Junior</option>
                                <option value="mid">Mid-Level</option>
                                <option value="senior">Senior</option>
                                <option value="lead">Lead</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="p-github">GitHub Username</label>
                            <input type="text" id="p-github" [(ngModel)]="form.githubUsername" name="githubUsername"
                                class="form-control" placeholder="octocat">
                        </div>
                        <div class="form-group">
                            <label for="p-portfolio">Portfolio URL</label>
                            <input type="url" id="p-portfolio" [(ngModel)]="form.portfolio" name="portfolio"
                                class="form-control" placeholder="https://johndoe.dev">
                        </div>
                    </div>
                </fieldset>

                <!-- Section: Company Information (Employers) -->
                <fieldset class="form-section">
                    <legend>Company Information</legend>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="c-name">Company Name</label>
                            <input type="text" id="c-name" [(ngModel)]="form.companyName" name="companyName"
                                class="form-control" placeholder="TechCorp Inc.">
                        </div>
                        <div class="form-group">
                            <label for="c-web">Company Website</label>
                            <input type="url" id="c-web" [(ngModel)]="form.companyWebsite" name="companyWebsite"
                                class="form-control" placeholder="https://techcorp.com">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="c-size">Company Size</label>
                            <select id="c-size" [(ngModel)]="form.companySize" name="companySize" class="form-control">
                                <option value="">Select Size</option>
                                <option value="1-10">1-10 Employees</option>
                                <option value="11-50">11-50 Employees</option>
                                <option value="51-200">51-200 Employees</option>
                                <option value="201-500">201-500 Employees</option>
                                <option value="500+">500+ Employees</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="c-industry">Industry</label>
                            <input type="text" id="c-industry" [(ngModel)]="form.industry" name="industry"
                                class="form-control" placeholder="e.g. Fintech">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="c-desc">Company Description</label>
                        <textarea id="c-desc" [(ngModel)]="form.companyDescription" name="companyDescription"
                            class="form-control" rows="3"></textarea>
                    </div>
                </fieldset>

                <!-- Form Actions -->
                <footer class="form-actions">
                    <button type="submit" class="btn-primary" [disabled]="saving">
                        {{ saving ? 'Saving Changes...' : 'Save All Changes' }}
                    </button>
                </footer>
            </form>

        </ng-container>
    </div>
</div>
