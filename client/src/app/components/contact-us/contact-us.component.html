<div class="contact-container">
    <div class="contact-header">
        <h1>Contact Us</h1>
        <p>Have questions or feedback? We'd love to hear from you.</p>
    </div>

    <div class="contact-content">
        <div class="contact-info">
            <div class="info-card">
                <h3>Get in Touch</h3>
                <p>Feel free to reach out to us via the form or through our contact details below.</p>

                <div class="info-item">
                    <span class="icon">📍</span>
                    <div>
                        <strong>Address</strong>
                        <p>123 Skill Street, Tech City, TC 56789</p>
                    </div>
                </div>

                <div class="info-item">
                    <span class="icon">📧</span>
                    <div>
                        <strong>Email</strong>
                        <p>mail.skillproof@gmail.com</p>
                    </div>
                </div>

                <div class="info-item">
                    <span class="icon">📞</span>
                    <div>
                        <strong>Phone</strong>
                        <p>+91 9876543210</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="contact-form-container">
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" [(ngModel)]="contactData.name" required
                        placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" [(ngModel)]="contactData.email" required
                        placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" [(ngModel)]="contactData.subject" required
                        placeholder="How can we help?">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" [(ngModel)]="contactData.message" required rows="5"
                        placeholder="Your message here..."></textarea>
                </div>

                <button type="submit" [disabled]="!contactForm.form.valid" class="btn-submit">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</div>
