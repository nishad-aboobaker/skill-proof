<div class="contact-section">
    <!-- Page Header -->
    <div class="section-header">
        <h1>Contact Us</h1>
        <p>Have questions or feedback? We'd love to hear from you.</p>
    </div>

    <div class="contact-layout">
        <!-- Contact Information -->
        <div class="contact-info">
            <h3>Get in Touch</h3>
            <p>Feel free to reach out to us via the form or through our contact details below.</p>

            <div class="info-group">
                <span class="icon">📍</span>
                <div>
                    <strong>Address</strong>
                    <p>123 Skill Street, Tech City, TC 56789</p>
                </div>
            </div>

            <div class="info-group">
                <span class="icon">📧</span>
                <div>
                    <strong>Email</strong>
                    <p>mail.skillproof@gmail.com</p>
                </div>
            </div>

            <div class="info-group">
                <span class="icon">📞</span>
                <div>
                    <strong>Phone</strong>
                    <p>+91 9876543210</p>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="contact-form">
            <div class="form-field">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" [(ngModel)]="contactData.name" required placeholder="John Doe">
            </div>

            <div class="form-field">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" [(ngModel)]="contactData.email" required
                    placeholder="john@example.com">
            </div>

            <div class="form-field">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" [(ngModel)]="contactData.subject" required
                    placeholder="How can we help?">
            </div>

            <div class="form-field">
                <label for="message">Message</label>
                <textarea id="message" name="message" [(ngModel)]="contactData.message" required rows="5"
                    placeholder="Your message here..."></textarea>
            </div>

            <button type="submit" [disabled]="!contactForm.form.valid" class="submit-button">
                Send Message
            </button>
        </form>
    </div>
</div>
